<figure class="theme-image">
  <img
    class="theme-image__image theme-image__image--light"
    src="{{ .Get "light" }}"
    alt="{{ .Get "alt" }}"
    loading="lazy"
    decoding="async"
  >
  <img
    class="theme-image__image theme-image__image--dark"
    src="{{ .Get "dark" }}"
    alt="{{ .Get "alt" }}"
    loading="lazy"
    decoding="async"
  >
</figure>
