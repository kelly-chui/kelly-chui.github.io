{{- if findRE `class="mermaid"` .Content -}}
<script src="/js/vendor/mermaid.min.js"></script>
<script>
  (async () => {
    mermaid.initialize({
      startOnLoad: false,
      theme: document.documentElement.dataset.theme === "dark"
        ? "dark"
        : "default",
      securityLevel: "strict"
    });

    await mermaid.run({
      querySelector: ".mermaid"
    });
  })();
</script>
{{- end -}}
